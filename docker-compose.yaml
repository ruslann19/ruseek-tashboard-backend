version: "3.8"

services:
  backend:
    image: ruseek-tashboard-backend
    container_name: ruseek-tashboard-backend
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
  db:
    image: postgres:18.4
    container_name: ruseek-tashboard-db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
